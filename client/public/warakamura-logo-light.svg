<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Warakamura Constructions logo">
  <!-- Light-on-dark version for dark headers/navbars -->

  <!-- W mark (no outer tile, meant to sit on dark backgrounds) -->
  <path
    d="M92 92 L128 92 L162 184 L196 92 L232 92 L184 228 L160 228 L110 120 L60 228 L36 228 L92 92 Z"
    fill="#FACC15"/>

  <!-- Subtle cut to make the W feel layered -->
  <path
    d="M128 92 L148 92 L160 124 L172 92 L192 92 L160 168 L128 92 Z"
    fill="#0B1220" opacity="0.55"/>

  <!-- Wordmark -->
  <g transform="translate(300 92)">
    <text
      x="0"
      y="64"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
      font-size="64"
      font-weight="800"
      letter-spacing="-0.5"
      fill="#F9FAFB"
    >Warakamura</text>

    <text
      x="2"
      y="128"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif"
      font-size="34"
      font-weight="700"
      letter-spacing="2.5"
      fill="#9CA3AF"
    >CONSTRUCTIONS</text>

    <!-- Accent underline -->
    <rect x="2" y="148" width="420" height="8" rx="4" fill="#FACC15"/>
  </g>
</svg>
